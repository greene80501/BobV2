<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>bob Browser Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #161616;
      --panel: #262626;
      --panel-2: #1f1f1f;
      --border: #393939;
      --accent: #0f62fe;
      --accent-hover: #0353e9;
      --text: #f4f4f4;
      --text-dim: #8d8d8d;
      --error-bg: #3a1f1f;
      --error-text: #ff8389;
      --success: #42be65;
      --warning: #f1c21b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-accent { height: 3px; background: var(--accent); flex-shrink: 0; }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .topbar-logo { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
    .topbar-title {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }
    .topbar-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar-sub {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .status-pill.connected    { border-color: var(--success); color: var(--success); }
    .status-pill.connecting   { border-color: var(--warning); color: var(--warning); }
    .status-pill.disconnected { border-color: var(--border); color: var(--text-dim); }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .status-pill.connecting .status-dot { animation: dot-pulse 1s ease-in-out infinite; }
    @keyframes dot-pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Messages / activity log */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .empty-state {
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 30px 20px;
    }
    .empty-logo { width: 220px; height: 220px; object-fit: contain; }
    .empty-logo.bob-thinking {
      animation: bob-buzz 0.9s ease-in-out infinite;
    }
    @keyframes bob-buzz {
      0%, 100% {
        filter: drop-shadow(0 0 6px rgba(15,98,254,0.7)) drop-shadow(0 0 14px rgba(15,98,254,0.4));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 18px rgba(15,98,254,1)) drop-shadow(0 0 36px rgba(15,98,254,0.8)) drop-shadow(0 0 60px rgba(80,160,255,0.5));
        transform: scale(1.06);
      }
    }
    .empty-title   { font-size: 16px; font-weight: 600; color: var(--text); text-align: center; }
    .empty-subtitle { font-size: 13px; color: var(--text-dim); text-align: center; }

    /* Log entries reuse the old bubble style */
    .message { display: flex; width: 100%; animation: fadeUp 0.18s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message-bot { justify-content: flex-start; }
    .bubble {
      max-width: 92%;
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message-bot .bubble {
      background: var(--panel);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .message.ok    .bubble { border-color: #1d4d2c; color: #6fdc8c; }
    .message.error .bubble { background: var(--error-bg); color: var(--error-text); border: 1px solid #5a2a2a; }
    .message.info  .bubble { color: var(--text-dim); font-size: 12px; }
    .bubble-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 3px;
      font-weight: 500;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* Thinking dots (same as original) */
    .thinking-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .thinking-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: dot-bounce 1.2s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Footer bar — replaces old composer */
    .composer {
      border-top: 1px solid var(--border);
      padding: 10px 12px 14px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      min-height: 42px;
      font-size: 13px;
      color: var(--text-dim);
      transition: border-color 0.2s;
    }
    .action-row.active { border-color: var(--accent); color: var(--text); }
    .action-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .action-count {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      flex-shrink: 0;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
